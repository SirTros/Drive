<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SirTros Drive</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0a0a0a,#1a1a1a);
    color:white;
}

header{
    background:#000;
    padding:16px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    border-bottom:2px solid #333;
}

.container{padding:12px;}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    outline:none;
}

.suggestions{
    background:#1e1e1e;
    margin-top:6px;
    border-radius:10px;
    overflow:hidden;
}

.suggestions div{
    padding:10px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.suggestions div:hover{
    background:#333;
}

.card{
    background:#161616;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:8px;
    font-weight:bold;
    background:#00e676;
}

.small{
    font-size:12px;
    opacity:0.6;
}

.item{
    background:#222;
    padding:8px;
    margin:5px 0;
    border-radius:8px;
}
</style>
</head>

<body>

<header>🚗 SirTros Drive – REAL WORLD (OSM)</header>

<div class="container">

<!-- ADRESA -->
<h3>📍 Adresa</h3>
<input id="search" oninput="searchPlaces()" placeholder="Napiš adresu (Praha, dům, obývák...)">

<div class="suggestions" id="list"></div>

<div class="card">
<div><b>Vybraná adresa:</b></div>
<div id="selected">---</div>
</div>

<!-- KOŠÍK -->
<div class="card">
<h3>🛒 Košík jízd</h3>
<div id="cart"></div>
</div>

<button onclick="addToCart()">➕ Přidat jízdu</button>

<!-- USER DATA -->
<div class="card">
<h3>👤 Údaje</h3>
<input id="name" placeholder="Jméno">
<input id="phone" placeholder="Telefon">
<input id="email" placeholder="Email">
</div>

<button onclick="send()">🚀 ODESLAT OBJEDNÁVKU</button>

</div>

<script>

let results = [];
let selectedPlace = "";

async function searchPlaces(){
    let q = document.getElementById("search").value;

    if(q.length < 2){
        document.getElementById("list").innerHTML = "";
        return;
    }

    let url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`;

    let res = await fetch(url);
    let data = await res.json();

    results = data;

    let html = "";

    data.slice(0,6).forEach((p,i)=>{
        html += `<div onclick="selectPlace(${i})">
        📍 ${p.display_name}
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

function selectPlace(i){
    selectedPlace = results[i].display_name;

    document.getElementById("selected").innerText = selectedPlace;
    document.getElementById("search").value = selectedPlace;

    document.getElementById("list").innerHTML = "";
}

function addToCart(){
    if(!selectedPlace){
        alert("❌ Nejprve vyber adresu!");
        return;
    }

    let div = document.createElement("div");
    div.className = "item";
    div.innerText = "🚗 " + selectedPlace;

    document.getElementById("cart").appendChild(div);
}

function send(){

    let items = [];
    document.querySelectorAll(".item").forEach(i=>{
        items.push(i.innerText);
    });

    fetch("https://formspree.io/f/mdargvpd", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            email: document.getElementById("email").value,
            orders: items.join(", ")
        })
    });

    alert("✅ Objednávka odeslána!");
}

</script>

</body>
</html>
