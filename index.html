<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SirTros Drive</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

header{
    background:#000;
    padding:16px;
    text-align:center;
    font-weight:bold;
    border-bottom:1px solid #333;
}

.container{padding:12px;}

input{
    width:100%;
    padding:14px;
    font-size:16px;
    border:none;
    border-radius:10px;
    margin-top:6px;
    outline:none;
}

.suggestions{
    background:#1c1c1c;
    margin-top:6px;
    border-radius:10px;
    overflow:hidden;
}

.suggestions div{
    padding:10px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.suggestions div:hover{
    background:#333;
}

.card{
    background:#161616;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

.item{
    background:#222;
    padding:8px;
    margin:5px 0;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    background:#00e676;
    font-weight:bold;
}
</style>
</head>

<body>

<header>🚗 SirTros Drive – FULL BOLT SYSTEM</header>

<div class="container">

<h3>📍 Adresa (real world search)</h3>
<input id="search" oninput="search()" placeholder="např. Praha 5 Plzeňská 120">

<div class="suggestions" id="list"></div>

<div class="card">
<h3>🎯 Vybraná adresa</h3>
<div id="selected">---</div>
</div>

<div class="card">
<h3>🚦 ODKUD</h3>
<input id="from" placeholder="např. Obývák, Praha 5">
</div>

<div class="card">
<h3>🏁 KAM</h3>
<input id="to" placeholder="např. Televize, Karlovo náměstí">
</div>

<div class="card">
<h3>🛒 Košík jízd</h3>
<div id="rides"></div>
</div>

<button onclick="addRide()">➕ Přidat jízdu</button>

<div class="card">
<h3>👤 Údaje</h3>
<input id="name" placeholder="Jméno">
<input id="phone" placeholder="Telefon">
<input id="email" placeholder="Email">
</div>

<button onclick="send()">🚀 ODESLAT OBJEDNÁVKU</button>

</div>

<script>

let results = [];
let selected = "";

async function search(){
    let q = document.getElementById("search").value;

    if(q.length < 3){
        document.getElementById("list").innerHTML = "";
        return;
    }

    let url = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=6&q=${encodeURIComponent(q)}`;

    let res = await fetch(url);
    let data = await res.json();

    results = data;

    let html = "";

    data.forEach((p,i)=>{
        html += `
        <div onclick="select(${i})">
            📍 ${p.display_name}
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

function select(i){
    selected = results[i].display_name;
    document.getElementById("selected").innerText = selected;
    document.getElementById("search").value = selected;
    document.getElementById("list").innerHTML = "";
}

function addRide(){

    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    if(!from || !to){
        alert("Vyplň ODKUD a KAM!");
        return;
    }

    let div = document.createElement("div");
    div.className = "item";
    div.innerText = "🚗 " + from + " ➜ " + to;

    document.getElementById("rides").appendChild(div);
}

function send(){

    let items = [];
    document.querySelectorAll(".item").forEach(i=>{
        items.push(i.innerText);
    });

    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    // 🚗 TRASA LINK (klikací Google Maps)
    let routeLink =
        "https://www.google.com/maps/dir/?api=1&origin="
        + encodeURIComponent(from)
        + "&destination="
        + encodeURIComponent(to);

    fetch("https://formspree.io/f/mdargvpd", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            email: document.getElementById("email").value,

            from: from,
            to: to,

            rides: items.join(", "),
            route: routeLink
        })
    });

    alert("✅ Objednávka odeslána!");
}

</script>

</body>
</html>
